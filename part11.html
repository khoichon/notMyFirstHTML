<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" name=viewport content="width=device-width, initial-scale=1.0">
     <title>Part 11</title>
      <style>
        body{
          background-color: #000000;
          color: #ffffff;
          font-family: monospace;
        }
      </style>
       <script src="global.js"></script>
  </head>
  <body>
    <form>
      <label>What do you think of this experience so far?</label><br>
      <input type=radio id="1" name="rating" value="1">
      <label for="1">Meh.</label><br>
      <input type=radio id="2" name="rating" value="2">
      <label for="2">It's alright, but can be improved</label><br>
      <input type=radio id="3" name="rating" value="3">
      <label for="3">I'm enjoying it!</label><br>
      <input type=radio id="4" name="rating" value="4">
      <label for="4">I'm really enjoying it!</label><br>
      <input type=radio id="5" name="rating" value="5">
      <label for="5">I'm loving it!</label><br>
      <input type="button" value="Click me!" onclick="dialogue()">
    </form>
    <script>
      debounce = false;
      async function dialogue() {
        if (debounce) return;
        debounce = true
        // Store checkpoint state to localStorage
        localStorage.setItem("checkpoint", "1");
        await openmsginfo("Checkpoint","You made it to a checkpoint!")
        await openmsginfo("Checkpoint","You can access this checkpoint from the main menu.")
        
      }
    </script>
  </body>
