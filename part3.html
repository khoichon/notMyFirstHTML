  <body id="body">
    <h1>Safe Zone</h1>

    <script>
      function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function claimReward() {
        alert("You have claimed a reward!");
        await sleep(2000);
        alert("Oh no.");
        await sleep(1000);
        document.getElementById("body").innerHTML = "<img src=rickroll.jpg id=rickroll>";
        width = window.innerWidth;
        height = window.innerHeight;
        document.getElementById("rickroll").innerHTML = `<img src=rickroll.jpg width=${width} height=${height}>`
        await sleep(1000);
        alert("Oh no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no no");
        await sleep(1000);
        alert("Come on! This place isn't safe anymore!")
        window.location.href = "./part4.html";
      }
    </script>
    <script src="global.js"></script>
