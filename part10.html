<!DOCTYPE html>
<!-- This might be the most script-heavy page in the entire website. -->
<html>
  <head>
    <meta charset="utf-8" name=viewport content="width=device-width, initial-scale=1.0">
     <title>Part 10</title>
     <style>
        body{
          background-color: #000000;
          color: #ffffff;
          font-family: monospace;
        }
        .hidden{
          visibility: hidden;
        }
       .hitboxhidden{
         display:none;
       }
        .visible{
          display: block;
        }
        .center{
          text-align: center;
        }
       button {
         width: 80px;
         height: 80px;
         font-size: 24px;
       }
       .center {
         display: flex;
         justify-content: center; /* horizontal */
         align-items: center;     /* vertical */
         height: 100vh;
       }
      </style>
  </head>
  <body>
    <!-- There's a ton of buttons in a 3x3 grid, but most of them is hidden, but it should still take up space -->
    <table class="center">
      <tr>
        <td><button id="btn1" class="hidden"></button></td>
        <td><button id="btn2" class="hidden"></button></td>
        <td><button id="btn3" class="hidden"></button></td>
      </tr>
      <tr>
        <td><button id="btn4" class="hidden"></button></td>
        <td><button id="btn5"></button></td>
        <td><button id="btn6" class="hidden"></button></td>
      </tr>
      <tr>
        <td><button id="btn7" class="hidden"></button></td>
        <td><button id="btn8" class="hidden"></button></td>
        <td><button id="btn9" class="hidden"></button></td>
      </tr>
    </table>
    <script src="global.js"></script>
    <script>
      usingPopup = true
      // wait until btn5 is clicked
      function setCorrectButtonAndWait(button,popup) {
        return new Promise((resolve) => {

          for (let i = 1; i <= 9; i++) {
            const btn = document.getElementById("btn" + i);

            if (i === button) {
              btn.onclick = () => {
                // focus popup
                popup.focus();
                resolve();
              };
            } else {
              btn.onclick = () => {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
              };
            }
          }

        });
      }
      document.getElementById("btn5").addEventListener("click", async function() {
        // PLAY MUSIC immediately
        if (!localStorage.getItem("disablesound")) {
          window.part10Audio = new Audio("/part10.mp3");
          window.part10Audio.loop = true;
          try {
            await window.part10Audio.play();
          } catch(e) {
            console.warn("Browser blocked autoplay, try clicking the button again");
          }
        }

        // Open popup
        let popup = window.open("./popups/part1.html", "popup", "width=400,height=400");
        if (!popup) {
          alert("Please allow popups for this website to continue.");
          return;
        }

        // reload page if popup closed
        popup.addEventListener("beforeunload", function() {
          if (usingPopup) window.location.reload();
        });

        // show buttons
        document.getElementById("btn2").classList.remove("hidden");
        document.getElementById("btn8").classList.remove("hidden");

        // write popup content
    popup.document.write(`
    <style>
    body { background-color: #000000; color: #ffffff; font-family: monospace; }
    </style>

    <pre id="note">
    You’re standing in the center again.

Most people keep their eyes level with the room,
as if the answer will appear right in front of them.

But sometimes the obvious place to start
is simply above you.
    </pre>

    <script src="/popups/script.js"><\/script>
    `);
        popup.document.close();
        // add script check to popup
        // wait for correct button
        await setCorrectButtonAndWait(2, popup);
        popup.document.getElementById("note").innerHTML = `
        The ceiling corner catches your attention.

Light slips in from the upper edge of the room,
but it fades as it drifts toward the left side.

If you're looking for the next step,
that corner might be worth checking.
`;
        // show left buttons
        document.getElementById("btn1").classList.remove("hidden");
        document.getElementById("btn4").classList.remove("hidden");
        document.getElementById("btn7").classList.remove("hidden");
        await setCorrectButtonAndWait(1, popup);
        popup.document.getElementById("note").innerHTML = `
        The wall on your left feels different.

        Not broken,
        not hidden,
        just ignored.

        People rarely bother to check that side,
        which makes it a good place to look next.
        `
        // Show specifically the right button
        document.getElementById("btn6").classList.remove("hidden");
        document.getElementById("btn1").classList.remove("hidden");
        await setCorrectButtonAndWait(4, popup);
        popup.document.getElementById("note").innerHTML = `
        You notice a faint scrape on the floor.

        It starts near your feet
        and drifts toward the corner
        down and to the left.

        Something definitely passed through there.
        `
        document.getElementById("btn3").classList.remove("hidden");
        document.getElementById("btn4").classList.remove("hidden");
        await setCorrectButtonAndWait(7, popup);
        popup.document.getElementById("note").innerHTML = `
        The floor creaks under your weight.

        That sound makes you stop
        and look down for a moment.

        Maybe the next move
        is somewhere below you.
        `
        document.getElementById("btn9").classList.remove("hidden");
        document.getElementById("btn7").classList.remove("hidden");
        await setCorrectButtonAndWait(8, popup);
        popup.document.getElementById("note").innerHTML = `
        A reflection flickers across the floor.

        It disappears quickly,
        but you catch where it came from.

        Near the corner
        down and to the right.
        `
        await setCorrectButtonAndWait(9, popup);
        popup.document.getElementById("note").innerHTML = `
        A faint draft brushes past your shoulder.

        You turn slightly
        and notice it coming from the wall
        to your right.

        It might be worth going that way.
        `
        await setCorrectButtonAndWait(6, popup);
        popup.document.getElementById("note").innerHTML = `
        The light shifts again.

        For a second,
        the upper corner of the room
        to your right catches the glow.

        It’s subtle,
        but it’s definitely there.
        `
        await setCorrectButtonAndWait(3,popup)
        // Hide everything except btn5
        for (let i = 1; i <= 9; i++) {
          if (i != 5) document.getElementById("btn" + i).classList.add("hitboxhidden");
        }
        popup.document.getElementById("note").innerHTML = `
        You made it.

        Most people stop halfway through,
        assuming the directions mean nothing.
        
        But the room was guiding you
        the entire time.
        
        You just had to follow where it pointed.`
        await setCorrectButtonAndWait(5,popup)
        usingPopup = false;
        setTimeout(() => {
          if (popup && !popup.closed) {
            popup.close();
          }
          window.location.href = "./part11.html";
        }, 100);
      });
      
      
    </script>
  </body>
</html>
