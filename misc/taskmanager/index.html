<html>

    <style>

      :root{
        --bg: #9EB7E5;
        --text: #0C120C;
        --primary: #648DE5;
        --accent: #00FF6C;
        --secondary: #320e3b;
        --btn-text: #0C120C;
        --danger: #ff0000;
      }
      .dark{
        --bg:#0d1117;
        --text:#00ff9c;
        --primary:#262b32;
        --secondary:#010409;
        --accent:#00ff9c;
        --btn-text:#0d1117;
        --danger:#ff0000;
      }
      .alex{
        --bg:#333232;

      }
      input {
        background-color: var(--primary);
        color: var(--text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;
        border-radius: 5px
      }
      textarea {
        background-color: var(--primary);
        color: var(--text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;
        border-radius: 5px;

  <body>

    <script src="../../global.js"></script>
    <script src="../supabase.js?v=2"></script>
    <!-- navigation bar here -->
    <nav id="navbar"><button onclick="window.location.href='./page2.html'">Calendar</button><button id="themebtn">Toggle Style</button></nav>

    
    <!-- actual task manager code here -->
    <div id="tasks">
      <h1>Task Manager</h1>
      <p>This is the task manager. It is used to manage tasks.</p>
      <p>You can add tasks by clicking the button below.</p>

      <div id="addtaskdiv">
        <input type="text" id="taskname" placeholder="Task Name" required><br>
        <textarea rows=5 cols=40 id="taskdesc" placeholder="Task Description" required></textarea><br>
        <label for="taskstart">Task Start Date</label>
        <input type="datetime-local" id="taskstart" placeholder="Task Start Date" required><br>
        <label for="taskdue">Task Due Date</label>
        <input type="datetime-local" id="taskdue" placeholder="Task Due Date" required><br>
        <label for="private">Private?</label>
        <input type="checkbox" id="private" placeholder="Private?" required><br>
        <button id="addtask">
        Add Task
        </button>
      </div>

      <div id="tasklist"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    
    <script>
      

      
      const supabaseUrl = 'https://digtgktzyxonguxhhdri.supabase.co'
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpZ3Rna3R6eXhvbmd1eGhoZHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDkzNzksImV4cCI6MjA4ODAyNTM3OX0.YYSwTR1Ns_zs7n5Brp6qTGZ1MYD_avfseMi1aGRcHGc'
      const supabaseclient = supabase.createClient(supabaseUrl, supabaseKey)


  


      
      async function getUsername(id){
        // reference the "users" table in supabase and match the "id" column and use the "name" parameter
        const { data, error } = await supabaseclient
          .from('users')
          .select('name')
          .eq('id', id)
          .single();
        if (error) {
          console.error(error);
          return null;
        }
        return data.name;
      }

      
      function renderTask(task) {

        let tasklist = document.getElementById("tasklist");
        let taskdiv = document.createElement("div");
        taskdiv.style="border: 1px solid white; padding: 10px; margin: 10px;"
        let timetaken = (new Date(task.time_end) - new Date(task.time_start)) / 1000 / 60
        taskdiv.innerHTML = `
          <h2>${task.task}</h2>
          <p>${task.desc}</p>
          <p>${task.time_start} to ${task.time_end} (${timetaken} minutes)</p>
          <p>${task.name}'s task (${task.private?"private":"public"})</p>

          <p><a href="./details.html?id=${task.id}" style="text-decoration: underline">View Details</a></p>
          <button onclick="(async (btn) => { await removeTask('${task.id}'); btn.parentElement.remove(); })(this);">Delete</button>
        `;

        tasklist.appendChild(taskdiv);
      }

      async function addTaskToList(task) {

        const result = await createTask(task);
        const savedTask = result[0];

        renderTask(savedTask);

        return savedTask.id;
      }

      async function loadTasks() {
        const { data } = await supabaseclient.auth.getUser();
        const email = data?.user?.email || null;

        let query = supabaseclient.from('tasks').select('*');

        if (email) {
          query = query.or(`private.eq.false,name.eq.${email}`);
        } else {
          query = query.eq('private', false);
        }

        const { data: tasks, error } = await query;

        if (error) { console.error(error); return; }
        navigator.serviceWorker.ready.then((sw) => {
          sw.active.postMessage({ type: "SYNC_TASKS", tasks: tasks });
        });
        tasks.forEach(task => renderTask(task));
      }

      async function removeTask(id) {
        const { data } = await supabaseclient.auth.getUser();
        const email = data?.user?.email || 'anonymous';

        const { data: task } = await supabaseclient
          .from('tasks')
          .select('name')
          .eq('id', id)
          .single();

        if (task.name !== email && task.name !== 'anonymous') {
          alert("You can't delete this task!");
          return;
        }

        await deleteTask(id);
      }

      loadTasks();


      async function checkLogin() {
        const {data, error} = await supabaseclient.auth.getUser()
        const navbar = document.getElementById("navbar");
        
        if (data.user) {
          console.log("Logged in as", data.user.email)
          
          const span = document.createElement("span");
          span.innerHTML = `<span style="color:var(--text)">Logged in as ${await getUsername(data.user.id)}</span>`;
          const profileBtn = document.createElement("button");
          profileBtn.textContent = "Profile";
          profileBtn.onclick = () => window.location.href = './profile.html';
          const logoutBtn = document.createElement("button");
          logoutBtn.textContent = "Logout";
          logoutBtn.onclick = logout;
          navbar.append(span, profileBtn, logoutBtn);
        } else {
          const loginBtn = document.createElement("button");
          loginBtn.textContent = "Login";
          loginBtn.onclick = () => window.location.href = './login.html';
          navbar.appendChild(loginBtn);
        }
      }
      checkLogin()
      async function logout() {
        const {error} = await supabaseclient.auth.signOut()
        if (error){
          console.log(error)
          alert("Error logging out: " + error.message)
        }
        window.location.reload()
      }
      async function addtask() {
        const { data } = await supabaseclient.auth.getUser();
        const email = data?.user?.email || 'anonymous';

        if (email === 'anonymous' && document.getElementById('private').checked) {
          alert("You must be logged in to create private tasks.");
          return;
        }
        addTaskToList({
          name: email,
          task: document.getElementById('taskname').value,
          desc: document.getElementById('taskdesc').value,
          time_end: document.getElementById('taskdue').value,
          time_start: document.getElementById('taskstart').value,
          private: document.getElementById('private').checked
        });

        document.getElementById('taskname').value = '';
        document.getElementById('taskdesc').value = '';
        document.getElementById('taskdue').value = '';
        document.getElementById('taskstart').value = '';
      }
      document.getElementById("addtask").addEventListener("click", addtask)

      // load service worker
      navigator.serviceWorker.register('../../sw.js')
    </script>
    
    <script>
      const themes = ["","dark","alex"]
      function loadTheme(){
        let t = parseInt(localStorage.getItem("theme")) || 0;
        if (isNaN(t)) t = 0;
        document.body.className = themes[t];
      }
      function setTheme(t){
        localStorage.setItem("theme", t);
        loadTheme();
      }
      function incrementTheme(){
        let t = parseInt(localStorage.getItem("theme")) || 0;
        console.log("before:", t, "body class:", document.body.className);
        if (isNaN(t)) t = 0;
        t = (parseInt(t) + 1) % themes.length;
        console.log("after:", t, "setting to:", themes[t]);
        setTheme(t);
        console.log("body class after set:", document.body.className);
      }
      document.getElementById("themebtn").addEventListener("click",incrementTheme)
      loadTheme();
    </script>
    <script>
      if (Notification.permission !== "granted") {
        Notification.requestPermission()
      }
      function notify(title, body) {
        if (Notification.permission !== "granted") return;
        new Notification(title, { body })
      }

      const notifiedStart = new Set();
      const notifiedEnd = new Set();

      setInterval(async () => {
        const { data } = await supabaseclient.auth.getUser();
        const email = data?.user?.email || null;

        let query = supabaseclient.from("tasks").select("*");
        if (email) {
          query = query.or(`private.eq.false,name.eq.${email}`);
        } else {
          query = query.eq('private', false);
        }

        const { data: tasks } = await query;

        tasks.forEach(task => {
          const now = new Date();
          if (new Date(task.time_start) <= now && new Date(task.time_end) >= now && !notifiedStart.has(task.id)) {
            notify("Task Started", `${task.task} has started!`);
            notifiedStart.add(task.id);
          }
          if (new Date(task.time_end) <= now && !notifiedEnd.has(task.id)) {
            notify("Task Due", `${task.task} is due!`);
            notifiedEnd.add(task.id);
          }
        });
      }, 30000);
    </script>
  </body>
