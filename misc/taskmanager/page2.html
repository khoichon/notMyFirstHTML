<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
      :root{
        --bg: #9EB7E5;
        --text: #0C120C;
        --primary: #648DE5;
        --accent: #00FF6C;
        --secondary: #320e3b;
        --btn-text: #0C120C;
        --danger: #ff0000
      }
      .dark{
         --bg:#0d1117;
         --text:#00ff9c;
         --primary:#262b32;
         --secondary:#010409;
         --accent:#00ff9c;
         --btn-text:#0d1117;
         --danger:#ff0000;
      }
      .alex{
        --bg:#333232;
        --text:#eeeeee;
        --primary:#a06cd5;
        --accent:#37ff8b;
        --secondary:#778472;
        --danger:#ff0022;
        --btn-text:#333232;
      }
      body{
        background-color: var(--bg);
        color: var(--text);
        font-family: monospace;
        transition:background 0.3s,color 0.3s;
      }
      button{
        background-color: var(--accent);
        color: var(--btn-text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;
        cursor: pointer;
        border-radius: 5px;
      }
      nav{
        background-color: var(--primary);
        padding: 10px;
        text-align: center;
        white-space: nowrap;
      }
      body.dark nav{
        color: #320e3b;
      }
    </style>
  </head>
  <script src="../../global.js"></script>
  <body>
    <nav>
      <button onclick="window.location.href='./'">Back to Home</button>
      <button id=changestyle>Toggle Style</button>
    </nav>
    <!-- iframe takes up the entire screen here -->
    <div id=controls>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'prev'},'*')">Previous</button>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'next'},'*')">Next</button>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'today'},'*')">Today</button>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'month'},'*')">Month</button>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'week'},'*')">Week</button>
      <button onclick="document.getElementById('calendariframe').contentWindow.postMessage({type:'day'},'*')">Day</button>
    </div>
    <div id=calendarembed style="width:100%;height:100%;resize:both; overflow:auto; min-width:200px; min-height:200px;">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      async function intro(){
      const supabaseUrl = "https://digtgktzyxonguxhhdri.supabase.co";
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpZ3Rna3R6eXhvbmd1eGhoZHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDkzNzksImV4cCI6MjA4ODAyNTM3OX0.YYSwTR1Ns_zs7n5Brp6qTGZ1MYD_avfseMi1aGRcHGc';
      const supabaseclient = supabase.createClient(supabaseUrl, supabaseKey);
      // fetch all avaliable tasks
      async function fetchTasks(){
        const { data } = await supabaseclient.auth.getUser();
        const email = data?.user?.email || null;

        let query = supabaseclient.from('tasks').select('*');

        if (email) {
          query = query.or(`private.eq.false,name.eq.${email}`);
        } else {
          query = query.eq('private', false);
        }

        const { data: tasks, error } = await query;

        if (error) { console.error(error); return; }
        return tasks;
      }

      
      // Load theme from local storage
      let themes = ["","dark","alex"]
      function loadTheme(t){
        document.body.className = themes[t];
        localStorage.setItem("theme", t);
      }
      function incrementTheme(){
        let t = parseInt(localStorage.getItem("theme")) || 0;
        t = (t + 1) % themes.length;
        loadTheme(t);
      }
      document.getElementById("changestyle").addEventListener("click", () => {
        incrementTheme();
        let t = parseInt(localStorage.getItem("theme")) || 0;
        iframe = document.getElementById("calendariframe")
        // Talk to the iframe instead!
        iframe.contentWindow.postMessage({ type: "changestyle", theme: t }, "*");
      })
      loadTheme(parseInt(localStorage.getItem("theme")) || 0);
      // Embed Calendar
      const embedCalendar = document.createElement("iframe");
      // generate a task string with name|desc|start|end,name|desc|start|end,...
      let tasks = await fetchTasks();
      let taskString = "";
      for (let task of tasks) {
        taskString += `${task.task}|${task.desc}|${task.time_start}|${task.time_end},`;
        console.log(taskString)
      }
      // remove the last comma
      taskString = taskString.slice(0, -1);
      console.log(taskString)
      embedCalendar.src = `./embed/calendar.html?hideheader=1&events=${encodeURIComponent(taskString)}`;
      embedCalendar.style.width = "100%";
      embedCalendar.style.height = "100%";
      embedCalendar.style.border = "none";
      embedCalendar.style.minHeight = "650px";
      embedCalendar.style.display = "block";
      embedCalendar.id="calendariframe"
      document.getElementById("calendarembed").appendChild(embedCalendar);
      }
      intro();
    </script>
  </body>
</html>
