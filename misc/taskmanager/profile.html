<!DOCTYPE html>
<html>
   <head>
    <meta charset="utf-8">

    <style>
      :root{
        --bg: #9EB7E5;
        --text: #0C120C;
        --primary: #648DE5;
        --accent: #00FF6C;
        --secondary: #320e3b;
        --btn-text: #0C120C;
        --danger: #ff0000;
      }
      .dark{
        --bg:#0d1117;
        --text:#00ff9c;
        --primary:#262b32;
        --secondary:#010409;
        --accent:#00ff9c;
        --btn-text:#0d1117;
        --danger:#ff0000;
      }
      .alex{
        --bg:#333232;
        --text:#eeeeee;
        --primary:#a06cd5;
        --accent:#37ff8b;
        --secondary:#778472;
        --danger:#ff0022;
        --btn-text:#333232;
      }
      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: monospace;
      }
      button {
        background-color: var(--accent);
        color: var(--btn-text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;

        border-radius: 5px;
      }
      nav {
        background-color: var(--primary);
        padding: 10px;
        text-align: center;
        white-space: nowrap;
      }
      body.dark nav {
        color: #320e3b;
      }
      input {
        background-color: var(--primary);
        color: var(--text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;
        border-radius: 5px
      }
      textarea {
        background-color: var(--primary);
        color: var(--text);
        border: 1px solid var(--text);
        padding: 5px;
        margin: 5px;
        border-radius: 5px;
      }
      input[type="checkbox"] {
        accent-color: var(--accent);
      }
      .center{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh
      }
    </style>
  </head>
  <body>
    <nav>
      <button onclick="window.location.href='./index.html'">Home</button>
      <button onclick="incrementTheme()">Profile</button>
    </nav>
    <center>
      <h1>Profile</h1>
      <p>This is your profile page.</p>
      <p>XP: <span id=xpval>0</span> / <span id=xpmax>10</span> (level <span id=xplvl>1</span>)</p>
      <progress id=xp value=0 max=1></progress>
    <br><button onclick = "startlearning();">Start Learning! (can gain you xp)</button>
    </center>
    <dialog class=incompletemodal id=incomplete style="transform:rotate(5deg);width: 50%; height: 50%;">

      <p>This part of the site is still in development. Please check back later.</p>
      <p>No, seriously.</p>
      <p>Why would you continue?</p>
      <p>Nothing here works.</p>
      <p>If you want to use this, <a href="mailto:nguyen_dac_khoi_nguyen@students.edu.sg?subject=Profile%20Page%20Feedback">at least just tell me to finish it up.</a></p>
      <button onclick="window.location.href='./'">I want to go back.</button><br>
      <button onclick="document.getElementById('incomplete').close()">I don't care, I like seeing broken stuff.</button><br>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      function sleep(ms){
        return new Promise(resolve => setTimeout(resolve, ms));
      }
      async function incompleteIntro(){
        await sleep(500)
        document.getElementById("incomplete").showModal();
      }
      incompleteIntro();
      let supabaseurl = "https://digtgktzyxonguxhhdri.supabase.co"
      let supabasepwd = "sb_publishable_tx_LAFDbNFWqdZuiaD4ReQ_9WIQ41dC"
      const supabaseclient = supabase.createClient(supabaseurl, supabasepwd);
    </script>
    <script>
      async function loadSaveData() {
        const { data: authData } = await supabaseclient.auth.getUser();

        if (!authData?.user) {
          alert("You must be logged in to use this feature.");
          return;
        }

        const userId = authData.user.id;

        const { data: userdata, error } = await supabaseclient
          .from("tasks_users")
          .select("*")
          .eq("id", userId)
          .maybeSingle();

        if (error && error.code !== "PGRST116") {
          // PGRST116 = "no rows found", anything else is a real error
          console.log("Error fetching data:", error);
          return;
        }

        if (!userdata) {
          // Row doesn't exist yet, create it with defaults
          await supabaseclient.from("tasks_users").insert({ id: userId });
          return { xp: 0, streak: 0, ballpit: 0 };
        }

        return userdata;
      }
      function getLevelData(xp){
        let level = 1;
        let xpmax = 10;
        while (xp >= xpmax){
          xp -= xpmax;
          level++;
          xpmax = Math.floor(xpmax * 1.2);
        }
        return {level, xp, xpmax};
      }
      function getLevelDiff(bef, aft) {
        let xp = 10;
        for (let i = 1; i < bef; i++) {
          xp = Math.floor(xp * 1.2);
        }
        // xp is now the cost of level bef→bef+1
        let total = 0;
        for (let i = bef; i < aft; i++) {
          total += xp;
          xp = Math.floor(xp * 1.2);
        }
        return total;
      }
    </script>
    <script>
      function update(){
      let data = loadSaveData();
      let levelData = getLevelData(data.xp);
      document.getElementById("xpval").innerHTML = levelData.xp;
      document.getElementById("xpmax").innerHTML = levelData.xpmax;
      document.getElementById("xplvl").innerHTML = levelData.level;
      document.getElementById("xp").value = levelData.xp / levelData.xpmax;
      }
    </script>
    <script>
      const themes = ["","dark","alex"];
      function loadTheme(){
        let t = parseInt(localStorage.getItem("theme")) || 0;
        if (isNaN(t)) t = 0;
        document.body.className = themes[t];
      }
      function setTheme(t){
        localStorage.setItem("theme", t);
        loadTheme();
      }
      function incrementTheme(){
        let t = parseInt(localStorage.getItem("theme")) || 0;
        console.log("before:", t, "body class:", document.body.className);
        if (isNaN(t)) t = 0;
        t = (parseInt(t) + 1) % themes.length;
        console.log("after:", t, "setting to:", themes[t]);
        setTheme(t);
        console.log("body class after set:", document.body.className);
      }
      loadTheme();
    </script>
  </body>
</html>
