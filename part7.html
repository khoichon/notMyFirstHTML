  <body>

    <script type=module>
      function sleep(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
      }
      // List of visited people intro
      // hide body tag
      document.body.style.display = "none";
      await sleep(1000);
      alert("We're here.")
      alert("The list of everyone who visited this place.")
      alert("Let's see it...")
      // unhide body tag
      document.body.style.display = "block";
    </script>
    <table id=namelist>
      <tr>
        <th>Name</th>

        <th>CCA</th>

      <script>
        debounce = false
        function sleep(ms) {
           return new Promise(resolve => setTimeout(resolve, ms));
        }
        async function transition() {
          if (debounce) return
          debounce=true
          await sleep(1000)
          alert("Have you really been here?")
          alert("All these people...")
          alert("They're all linked to one person.")
          alert("The creator.")
          await sleep(2000)
          alert("Do you know why?")
          alert("How?")
          alert("Because...")
          alert("If you somehow came here...")
          alert("You are the last person.")
          document.getElementById("namelist").innerHTML = document.getElementById("namelist").innerHTML + "<tr><td>You</td><td>???</td><td>???</td></tr>"
          await sleep(1000)
          alert("You are the last person.")
          alert("The last person to visit this place.")
          alert("The last person to see this list.")
          alert("The last person to know the truth.")
          alert("Bye.")
          alert("See you soon, then.")
          window.location.href = "./part8.html"
        }
      </script>
      <script src="global.js"></script>
