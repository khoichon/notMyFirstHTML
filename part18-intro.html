<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part 18</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      cursor: pointer;
    }

    video {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
  <script src="./global.js"></script>
</head>
<body>

  <script>
    enableCursorEffect();
    document.body.addEventListener('click', function handler() {
      document.body.removeEventListener('click', handler);

      const video = document.createElement('video');
      video.src = 'part18.mp4';
      video.autoplay = true;
      video.muted = true;
      video.loop = false;

      document.body.appendChild(video);
      setTimeout(() => {
        window.location.href = './part18.html';
      }, 4000)
    });
  </script>

</body>
</html>
